<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .input{
            background-color: white;
            font-size:2em;
            display:block;
            opacity:.8;
            color:limegreen;
            text-align:center;
            font-family:monospace;
            height: 50px;
            font-weight:bold;
        }
        .button{
            transition: all ease .2s;
            padding: 15px 40px;
            margin: 0px 0px;
            border:2px solid white;
            background-color:black;
            display: inline-block;
            font-size:2em;
            border-radius:10px;
            color:white;
            text-shadow: 3px 3px 3px red;
            cursor:pointer;
            font-weight:bold;
            width:100px;
        }
        .button:hover{
            color:white;
            text-shadow: 3px 3px 3px blue;
        }
        .buttonbox{
            display:flex;
            justify-content: space-around;
        }
        #random{
            padding: 3px;
            font-size:.8em;
        }
        #doublezero{
            padding:10px 40px;
        }
        body{
            background-image: linear-gradient(to right,purple,blue,cyan);
        }
        #datetime{
            color:darkblue;
            padding:2px;
            font-family:'Times New Roman', Times, serif;
            font-weight:bold;
            font-size:2em;
        }
    </style>
</head>
<body>
    <div class="bg-white text-center "><h1 id="datetime"></h1></div><br><br>
    <div class="mx-auto rounded-2xl w-4/12 border-2 border-solid border-white font-mono bg-gray-500">
        <input disabled="on" id="input" class="input mx-auto w-11/12 rounded-xl"><br>
        <div class="w-full mx-auto">
            <div class="buttonbox">
            <button class="button" onclick="input(1)">1</button>
            <button class="button" onclick="input(2)">2</button>
            <button class="button" onclick="input(3)">3</button>
            <button class="button" onclick="input('+')">+</button><br></div>
            <div class="buttonbox">
            <button class="button" onclick="input(4)">4</button>
            <button class="button" onclick="input(5)">5</button>
            <button class="button" onclick="input(6)">6</button>
            <button class="button" onclick="input('-')">-</button><br></div>
            <div class="buttonbox">
            <button class="button" onclick="input(7)">7</button>
            <button class="button" onclick="input(8)">8</button>
            <button class="button" onclick="input(9)">9</button>
            <button class="button" onclick="input('*')">*</button><br></div>
            <div class="buttonbox">
            <button class="button" onclick="input(0)">0</button>
            <button class="button" onclick="input('00')" id="doublezero">00</button>
            <button class="button" onclick="random()" id="random">Random(1-100)</button>
            <button class="button" onclick="input('/')">/</button><br></div>
            <div class="buttonbox">
            <button class="button" onclick="allclear()">AC</button>
            <button class="button" onclick="input('%')">%</button>
            <button class="button" onclick="clearinput()">C</button>
            <button class="button" onclick="equal()">=</button>
            <br></div><br>
    </div></div><br><br>
    <div class="bg-black text-white text-center font-mono">Ayush Verma</div>
    <script>
        function datetime(){
            const date = new Date();
            document.getElementById("datetime").innerText = date;
        }
        setInterval(datetime,1000);
        const inputf = document.getElementById("input");
        function input(a){
            inputf.value+=a;
        }
        function equal(){
            answer = eval(inputf.value);
            inputf.value = answer;
        }
        function allclear(){
            inputf.value = ''
        }
        function random(){
            let randomval = Math.floor(Math.random()*100)+1;
            inputf.value += randomval;
        }
        function clearinput(){
            let val = String(inputf.value);
            let newval = val.slice(0,-1);
            inputf.value = newval;
        }
    </script>
</body>
</html>
